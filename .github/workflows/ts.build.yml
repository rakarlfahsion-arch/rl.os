name: Build Typescript SDK

on:
  push:
    branches: [master]
    paths:
      - 'ts/**'
      - '.github/actions/setup-node-pnpm-bun/action.yml'
      - '.github/workflows/ts.build.yml'
      - 'mise.toml'
      - 'mise.lock'
      - 'turbo.jsonc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsdown.config.base.ts'
  pull_request:
    paths:
      - 'ts/**'
      - '.github/actions/setup-node-pnpm-bun/action.yml'
      - '.github/workflows/ts.build.yml'
      - 'mise.toml'
      - 'mise.lock'
      - 'turbo.jsonc'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsdown.config.base.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Print Turborepo telemetry events to the logs instead of sending them.
env:
  TURBO_TELEMETRY_DEBUG: 1

jobs:
  build:
    name: Build Typescript SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js, pnpm, Bun
        uses: ./.github/actions/setup-node-pnpm-bun
        with:
          enable-turbo-cache: 'true'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linting
        run: pnpm lint

      - name: Run Build
        run: pnpm run build:packages
